<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Chatbot Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans h-screen flex flex-col justify-between">

    <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center space-x-3">
            <div class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></div>
            <h1 class="text-xl font-bold tracking-tight">Smart AI Dashboard</h1>
        </div>
        <div class="text-xs bg-slate-900 px-3 py-1.5 rounded-full border border-slate-700 text-slate-400">
            Backend Port: <span class="text-emerald-400 font-mono">8000</span>
        </div>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-4 max-w-4xl w-full mx-auto">
        <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 max-w-xl shadow-md">
            <p class="text-emerald-400 font-semibold text-sm mb-1">System Engine Initialized</p>
            <p class="text-slate-300 text-sm">Welcome to your full-stack AI platform. Type a message below to test your active conversational memory window!</p>
        </div>
    </main>

    <footer class="bg-slate-800 border-t border-slate-700 p-4">
        <div class="max-w-4xl w-full mx-auto flex space-x-3">
            <input 
                type="text" 
                id="user-input" 
                placeholder="Type your generative query here..." 
                class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-slate-100 focus:outline-none focus:border-emerald-500 transition-colors placeholder-slate-500"
                onkeydown="if(event.key === 'Enter') dispatchMessage()"
            >
            <button 
                onclick="dispatchMessage()" 
                class="bg-emerald-600 hover:bg-emerald-500 text-white font-medium px-6 py-3 rounded-xl transition-all shadow-md flex items-center"
            >
                Send
            </button>
        </div>
    </footer>

    <script>
        const BACKEND_URL = "http://127.0.0.1:8000/chat";
        const USER_NAME = "Rishabh"; // Using your profile identity key for the stateful engine

        async function dispatchMessage() {
            const inputField = document.getElementById("user-input");
            const messageText = inputField.value.trim();
            
            if (!messageText) return;

            // Clear input container immediately for fluid interactive responses
            inputField.value = "";

            // Append User Chat Bubble to UI Matrix
            appendBubble("User", messageText);

            try {
                // Execute standard asynchronous network fetch over the API interface contract
                const response = await fetch(BACKEND_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: USER_NAME,
                        message: messageText
                    })
                });

                if (!response.ok) {
                    throw new Error(`Server returned HTTP Error Status: ${response.status}`);
                }

                const data = await response.json();
                
                // Format response output string nicely incorporating greetings and AI payload answers
                const compositeReply = `<strong>${data.greeting}</strong><br><br>${data.reply}`;
                appendBubble(data.bot_name, compositeReply);

            } catch (error) {
                console.error("Network communication breakdown: ", error);
                appendBubble("System Error", "Unable to transmit payload frames to your Python server core. Ensure 'main.py' is running locally on port 8000.");
            }
        }

        function appendBubble(sender, text) {
            const chatWindow = document.getElementById("chat-window");
            const bubbleWrapper = document.createElement("div");
            bubbleWrapper.className = "flex flex-col " + (sender === "User" ? "items-end" : "items-start");

            const isUser = sender === "User";
            const isError = sender === "System Error";

            let themeClasses = "bg-slate-800 text-slate-200 border-slate-700";
            if (isUser) themeClasses = "bg-emerald-600 text-white border-emerald-500";
            if (isError) themeClasses = "bg-rose-950 text-rose-200 border-rose-800";

            bubbleWrapper.innerHTML = `
                <span class="text-xs text-slate-500 font-mono mb-1 px-1">${sender}</span>
                <div class="max-w-xl border p-4 rounded-2xl shadow-sm text-sm leading-relaxed ${themeClasses}">
                    ${text}
                </div>
            `;

            chatWindow.appendChild(bubbleWrapper);
            
            // Instantly auto-scroll UI viewport containers downwards for new content turns
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
